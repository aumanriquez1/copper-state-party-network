<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copper State Party Network</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f0f0f;
color:white;
}

.hero{
height:80vh;
background-image:url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:42px;
letter-spacing:2px;
}

.hero p{
font-size:26px;
margin-top:20px;
}

.section{
padding:60px 20px;
max-width:800px;
margin:auto;
}

.section h2{
text-align:center;
margin-bottom:30px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input, textarea{

padding:14px;
border-radius:6px;
border:none;
font-size:16px;
}

button{

padding:14px;
background:#b87333;
border:none;
color:white;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

footer{

text-align:center;
padding:30px;
background:#111;
font-size:14px;
color:#aaa;

}

</style>

</head>

<body>


<div class="hero">

<div>

<h1>COPPER STATE PARTY NETWORK</h1>

<p>Celebrate in Style</p>

</div>

</div>


<div class="section">

<h2>Contact Us</h2>

<p style="text-align:center">Drop us a line!</p>


<form action="https://formspree.io/f/xvzwzrel" method="POST">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="phone" placeholder="Phone">

<textarea name="message" placeholder="Tell us what rentals you need (chairs, tables, bounce house, etc)" rows="5"></textarea>

<button type="submit">Send Request</button>

</form>

</div>


<footer>

Copper State Party Network  
Phoenix • Mesa • Chandler • Gilbert

</footer>


</body>

</html>
